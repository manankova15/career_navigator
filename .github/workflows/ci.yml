name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Compile Python modules
        run: python -m compileall packages services workers

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck

  container-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/auth-service
          - services/profile-service
          - services/source-service
          - services/vacancy-service
          - workers/ingestion-workers
    steps:
      - uses: actions/checkout@v4
      - name: Install podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman
      - name: Build container image
        run: podman build --no-cache -t career-navigator/$(basename ${{ matrix.service }}):ci ${{ matrix.service }}
